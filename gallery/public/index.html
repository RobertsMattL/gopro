<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GoPro Gallery</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <h1>GoPro Gallery</h1>
    <div class="topbar-actions">
      <span id="storage" class="storage" title="Disk usage on the served volume"></span>
      <span id="status" class="status">loading…</span>
      <button id="view-toggle" type="button" title="Switch to thumbnail-grid view">⊞ Grid</button>
      <button id="quality-toggle" type="button"
              title="Toggle between the original stream and a 720p re-encoded version for slow connections / phones">
        Quality: HD
      </button>
      <button id="refresh" type="button">Refresh</button>
    </div>
  </header>

  <main class="layout">
    <aside class="list-pane" aria-label="Video list">
      <div id="filters" class="filters" aria-label="Filters">
        <div id="type-filter" class="type-filter" role="group" aria-label="Media type">
          <button type="button" class="type-btn active" data-type="all">All</button>
          <button type="button" class="type-btn" data-type="image">Photos</button>
          <button type="button" class="type-btn" data-type="video">Videos</button>
        </div>
        <span class="filters-label">Filter:</span>
        <div id="filter-chips" class="chip-row"></div>
      </div>
      <div id="bulk-bar" class="bulk-bar hidden" aria-label="Bulk actions">
        <div class="bulk-row">
          <span id="bulk-count" class="bulk-count">0 selected</span>
          <button id="bulk-select-all" type="button" class="bulk-link">Select all</button>
          <button id="bulk-clear" type="button" class="bulk-link">Clear</button>
          <button id="bulk-delete" type="button" class="bulk-link bulk-danger">Delete</button>
        </div>
        <div class="cat-add">
          <input id="bulk-cat-input" type="text" list="cat-suggestions"
                 placeholder="Assign category to selected…" autocomplete="off" />
          <button id="bulk-cat-add-btn" type="button">Add</button>
        </div>
      </div>
      <section id="list" class="list"></section>
    </aside>

    <section class="detail" aria-label="Player">
      <div id="player-wrap" class="player-wrap">
        <button id="lb-prev" class="lb-nav lb-prev" type="button" title="Previous (←)" aria-label="Previous">‹</button>
        <button id="lb-next" class="lb-nav lb-next" type="button" title="Next (→)" aria-label="Next">›</button>
        <button id="lb-close" class="lb-close" type="button" title="Close (Esc)" aria-label="Close">×</button>
        <video id="player" controls preload="metadata" playsinline></video>
        <img id="image-view" class="image-view" alt="" />
        <div id="empty" class="empty">Select an item to view</div>
      </div>
      <div id="meta" class="meta">
        <div id="meta-info" class="meta-info"></div>
        <div id="meta-categories" class="meta-categories hidden">
          <div class="meta-categories-label">Categories</div>
          <div id="active-chips" class="chip-row"></div>
          <div class="cat-add">
            <input id="cat-input" type="text" list="cat-suggestions"
                   placeholder="Add category…" autocomplete="off" />
            <datalist id="cat-suggestions"></datalist>
            <button id="cat-add-btn" type="button">Add</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Frame picker: scrub a video, step frames, pick one to save as a photo. -->
  <div id="frame-modal" class="frame-modal hidden" aria-hidden="true">
    <div class="frame-dialog" role="dialog" aria-modal="true" aria-label="Pick a frame to save">
      <div class="frame-head">
        <span id="frame-title" class="frame-title"></span>
        <span id="frame-status" class="frame-status"></span>
        <button id="frame-close" type="button" class="frame-close"
                title="Close (Esc)" aria-label="Close">×</button>
      </div>
      <div class="frame-stage">
        <video id="frame-video" preload="auto" playsinline></video>
      </div>
      <div class="frame-scrub">
        <input id="frame-seek" type="range" min="0" max="0" step="0.001" value="0"
               aria-label="Scrub position" />
        <span id="frame-time" class="frame-time">0:00.000 / 0:00.000</span>
      </div>
      <div class="frame-controls">
        <button id="frame-play" type="button" class="frame-play"
                title="Play / pause (space)" aria-label="Play / pause">▶</button>
        <span class="frame-steps" role="group" aria-label="Step">
          <button type="button" data-step="-1" title="Back 1 second">−1s</button>
          <button type="button" data-step="-frame" title="Previous frame (←)">◀ frame</button>
          <button type="button" data-step="frame" title="Next frame (→)">frame ▶</button>
          <button type="button" data-step="1" title="Forward 1 second">+1s</button>
        </span>
        <button id="frame-save" type="button" class="frame-save">Save this frame</button>
      </div>
      <div id="frame-strip" class="frame-strip" aria-label="Sampled frames — click to jump"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
