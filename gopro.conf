# GoPro gallery configuration — sourced by start.sh (POSIX shell syntax).
# Edit these values to suit your setup; start.sh reads them on every run.

# Media root served by the gallery. Expected to contain images/ and video/
# subdirectories (start falls back to a flat scan if neither exists).
MEDIA_DIR="/Volumes/LaCie/media"

# Python REST API (gopro.py serve). Bound to localhost only — the gallery is
# the sole client and proxies to it.
API_HOST="127.0.0.1"
API_PORT="8787"

# Node gallery UI (gallery/server.js). Listens on all interfaces, so other
# devices on your network can reach it at http://<this-machine>:<port>/.
GALLERY_PORT="3000"

# Python interpreter to launch the API with.
PYTHON="python3"
